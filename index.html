<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <div class="stats">
                <div class="stat">
                    <h3>Highest : <span id="highest-score"></span></h3>
                </div>
                <div class="stat">
                    <h3>Score : <span id="score"></span></h3>
                </div>
                <div class="stat">
                    <h3>Time : <span id="time"></span></h3>
                </div>
            </div>
            <div class="board"></div>
        </section>
        <div class="modal">
            <div class="start-game">
                <h2>Welcome to Snake Game</h2>
                <button class="btn btn-start">Start Game</button> 
            </div>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
