<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <h3>
                Press 'Enter' to play and Press 'Escape' to stop
            </h3>
            <div class="stats">
                <div class="stat">
                    <h3>Highest : <span id="highest-score"></span></h3>
                </div>
                <div class="stat">
                    <h3>Score : <span id="score"></span></h3>
                </div>
                <div class="stat">
                    <h3>Time : <span id="time"></span></h3>
                </div>
            </div>
            <div class="board"></div>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
